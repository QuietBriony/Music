<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Hazama FM — music for thinking and building</title>
  <meta name="description" content="Hazama FM — generative focus radio powered by the UCM Mandala Engine. Press start and listen for hours." />

  <link rel="stylesheet" href="style.css?v=fm-5" />
  <link rel="stylesheet" href="fm.css?v=fm-5" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />
  <meta name="theme-color" content="#040e18" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Hazama FM" />
  <meta name="mobile-web-app-capable" content="yes" />

  <script src="https://unpkg.com/tone@14.8.49/build/Tone.js"></script>
  <script src="audio/namima-audio-adapter.js" defer></script>
  <script src="audio/human-groove-governor.js" defer></script>
  <script src="presets/loader.js?v=fm-5" defer></script>
  <script src="audio/genre-flavor.js?v=fm-5" defer></script>
  <script src="engine.js?v=fm-5" defer></script>
  <script src="fm.js?v=fm-5" defer></script>
</head>

<body data-page="fm">

  <!-- Mandala visual (engine.js mountMandalaLayers fills #mandala-layers automatically) -->
  <div id="mandala-container">
    <img src="assets/background.svg" id="mandala-bg" alt="" />
    <div id="mandala-layers"></div>
  </div>

  <!-- Visible FM UI -->
  <main id="fm-shell" aria-label="Hazama FM player">
    <h1>Hazama FM</h1>
    <p class="fm-tagline">music for thinking and building</p>

    <button id="fm_play" type="button" aria-label="Start playback" data-state="idle">START</button>

    <div id="fm-now" aria-live="polite">—</div>
    <div id="fm-progress" aria-hidden="true"><span></span></div>
    <div id="fm-next">up next: —</div>
    <div id="fm-resume" hidden></div>

    <div id="fm-energy" role="group" aria-label="Energy">
      <button type="button" data-energy="low" aria-pressed="false">low</button>
      <button type="button" data-energy="mid" aria-pressed="true">mid</button>
      <button type="button" data-energy="high" aria-pressed="false">high</button>
    </div>

    <div id="fm-genre" role="group" aria-label="Genre">
      <button type="button" data-genre="any" aria-pressed="true">any</button>
      <button type="button" data-genre="ambient" aria-pressed="false">ambient</button>
      <button type="button" data-genre="techno" aria-pressed="false">techno</button>
      <button type="button" data-genre="lofi" aria-pressed="false">lofi</button>
      <button type="button" data-genre="jazz" aria-pressed="false">jazz</button>
      <button type="button" data-genre="funk" aria-pressed="false">funk</button>
      <button type="button" data-genre="piano" aria-pressed="false">piano</button>
    </div>

    <a class="fm-back" href="index.html">full mixer →</a>
  </main>

  <!--
    Engine DOM shim.
    engine.js reads these IDs via getElementById without modifying the page layout.
    Hidden via fm.css. Values are tuned for "Auto Radio" defaults so MusicRadioBrainState
    drives program rotation without user intervention.
  -->
  <div id="fm-engine-shim" hidden aria-hidden="true">
    <!-- 9 UCM faders (engine.js:40-50 SLIDER_BY_UCM) -->
    <input type="range" id="fader_energy"   min="0" max="100" value="40" />
    <input type="range" id="fader_wave"     min="0" max="100" value="40" />
    <input type="range" id="fader_mind"     min="0" max="100" value="50" />
    <input type="range" id="fader_creation" min="0" max="100" value="50" />
    <input type="range" id="fader_void"     min="0" max="100" value="20" />
    <input type="range" id="fader_circle"   min="0" max="100" value="60" />
    <input type="range" id="fader_body"     min="0" max="100" value="50" />
    <input type="range" id="fader_resource" min="0" max="100" value="60" />
    <input type="range" id="fader_observer" min="0" max="100" value="50" />

    <!-- Master output (driven by fm.js fade ramp) -->
    <input type="range" id="output_level" min="0" max="100" value="0" />

    <!-- Auto-cycle / Radio brain driver -->
    <input type="range" id="auto_cycle" min="1" max="10" value="3" />
    <input type="checkbox" id="auto_toggle" checked />
    <select id="auto_arc_mode" aria-label="Auto arc mode">
      <option value="live">LIVE</option>
      <option value="arc36" selected>ARC.36</option>
    </select>

    <!-- Culture grammar — driven by GENRE pill (engine.js:1342 updateCultureGrammarFromUI) -->
    <select id="culture_grammar_select" aria-label="Culture grammar">
      <option value="auto" selected>AUTO</option>
      <option value="ambient_room">HAZE</option>
      <option value="tape_memory">TAPE</option>
      <option value="broken_machine">BROKEN</option>
      <option value="ghost_dub">GHOST</option>
      <option value="acid_core">ACID</option>
      <option value="chrome_hymn">CHROME</option>
      <option value="earth_reed">EARTH</option>
    </select>

    <!-- Engine binds click handlers to these in attachUI (engine.js:11719-11756). -->
    <button id="btn_start" type="button"></button>
    <button id="btn_stop" type="button"></button>

    <!-- Status / mode text — engine writes here (engine.js:11563, 11574). -->
    <span id="status-text"></span>
    <span id="mode-label"></span>
    <span id="header_bpm"></span>
    <span id="header_output"></span>
    <span id="header_sync"></span>
    <span id="auto_arc_status"></span>
  </div>

  <!-- Service worker — offline + cache -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch((err) => {
          console.warn("[Hazama FM] sw register failed:", err);
        });
      });
    }
  </script>

</body>
</html>
